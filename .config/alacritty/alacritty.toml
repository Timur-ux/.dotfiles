[window]
decorations="None"

[[keyboard.bindings]]
key="O"
mods = "Control|Shift"
action = "ReceiveChar"

[font.normal]
family = "JetBrainsMonoNL Nerd Font"
style = "Mono"

[font.italic]
family = "JetBrainsMonoNL Nerd Font"
style = "Italic"

[font.bold]
family = "JetBrainsMonoNL Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMonoNL Nerd Font"
style = "Bold Italic"

[font.offset]
x = 0
y = 0

[terminal.shell]
program = "zellij"
args = ["-l", "welcome"]
